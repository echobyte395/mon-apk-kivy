name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip zip unzip git openjdk-17-jdk \
        build-essential libffi-dev libssl-dev wget

    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # =========================
    # 🚨 IMPORTANT FIX CACHE
    # =========================
    - name: Clean buildozer cache
      run: |
        rm -rf .buildozer ~/.buildozer

    # =========================
    # 🤖 USE PREINSTALLED SDK (IMPORTANT FIX)
    # =========================
    - name: Setup Android SDK (NO SDKMANAGER BUILD 37)
      run: |
        sudo apt install -y android-sdk

        echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV

    # =========================
    # 🚀 BUILD DIRECT (NO sdkmanager 37)
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
