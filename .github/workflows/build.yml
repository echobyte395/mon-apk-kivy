name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROIDAPI: "34"
      ANDROIDMINAPI: "21"
      ANDROIDNDK: "25b"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================
    # 🧱 SYSTEM
    # =========================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip zip unzip git openjdk-17-jdk \
        build-essential libffi-dev libssl-dev

    # =========================
    # 🐍 PYTHON
    # =========================
    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # =========================
    # 🧹 CLEAN CACHE
    # =========================
    - name: HARD CLEAN
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer
        rm -rf ~/.android

    # =========================
    # 🔥 FORCE BUILD CONFIG BEFORE BUILD
    # =========================
    - name: Force Android 34 config
      run: |
        mkdir -p ~/.buildozer

        cat > ~/.buildozer/config.ini << EOF
[app]
android.api = 34
android.build_tools = 34.0.0
android.minapi = 21
EOF

    # =========================
    # 🚀 BUILD APK
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # 📦 OUTPUT
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
