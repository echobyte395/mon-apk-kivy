name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================
    # 🧱 SYSTEM DEPENDENCIES
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip zip unzip git openjdk-17-jdk \
        build-essential libffi-dev libssl-dev wget

    # =========================
    # 🐍 PYTHON
    # =========================
    - name: Install Python tools
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # =========================
    # 🧹 FORCE CLEAN EVERYTHING
    # =========================
    - name: HARD CLEAN (IMPORTANT)
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer
        rm -rf ~/.android
        rm -rf ~/.local/share/python-for-android

    # =========================
    # 🔥 FORCE BUILD CONFIG
    # =========================
    - name: Force stable Android config
      run: |
        mkdir -p ~/.buildozer

        cat > ~/.buildozer/config.ini << EOF
[app]
android.api = 34
android.build_tools = 34.0.0
android.minapi = 21
EOF

    # =========================
    # 🚀 BUILD APK (NO SDK MANAGER)
    # =========================
    - name: Build APK
      run: |
        export ANDROIDAPI=34
        export ANDROIDMINAPI=21

        buildozer -v android debug

    # =========================
    # 📦 OUTPUT
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
